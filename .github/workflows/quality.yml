name: Quality
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: gitleaks/gitleaks-action@v2
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall -q projects
      - run: python -m pytest -q tests/python
      - name: Reject tracked generated artifacts
        shell: bash
        run: |
          if git ls-files | grep -Ei '(^|/)(bin|obj|runs|\.codex-work|\.momentus-profile)(/|$)|(^|/)(progress\.csv|summary\.json)$'; then
            echo "Generated or diagnostic artifacts must not be tracked."
            exit 1
          fi
  dotnet:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore and build every project
        shell: pwsh
        run: |
          dotnet restore Kallman.Automation.slnx
          dotnet build Kallman.Automation.slnx --configuration Release --no-restore
      - name: Run automated tests
        run: dotnet test Kallman.Automation.slnx --configuration Release --no-build
      - name: Report vulnerable NuGet dependencies
        shell: pwsh
        run: |
          $projects = Get-ChildItem -Recurse -Filter *.csproj | Where-Object FullName -NotMatch '\\(bin|obj)\\'
          foreach ($project in $projects) {
            dotnet list $project.FullName package --vulnerable --include-transitive
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
